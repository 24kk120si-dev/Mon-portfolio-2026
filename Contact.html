    <main class="contact-container">
        <section class="contact-info">
            <h1>Contactez-moi</h1>
            <p>Je suis basé à <strong>Lubumbashi</strong>. N'hésitez pas à me joindre pour toute collaboration ou opportunité.</p>
            
            <div class="contact-methods">
                <p><i class="fa-solid fa-phone"></i> +243 970 882 548</p>
                <div class="social-apps">
                    <a href="https://wa.me/243970882548" target="_blank" class="whatsapp">
                        <i class="fa-brands fa-whatsapp"></i> WhatsApp
                    </a>
                    <a href="https://t.me/+243970882548" target="_blank" class="telegram">

        <section class="contact-form">
            <form action="#">
                <div class="form-group">
                    <label for="name">Nom complet</label>
                    <input type="text" id="name" name="name" placeholder="Votre nom" required>
                </div>
                <div class="form-group">
                    <label for="phone">Téléphone</label>
                    <input type="tel" id="phone" name="phone" placeholder="+243..." required>
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="5" placeholder="Votre message..."></textarea>
                </div>
                <button type="submit" class="btn-submit">Envoyer</button>
            </form>
        </section>
